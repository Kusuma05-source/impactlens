<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ImpactLens — Login</title>
  <meta name="description" content="Login to ImpactLens AI Sustainability Reporter">
  
  <!-- FontAwesome & Google Fonts (loaded in style.css, but loaded here too for reliability) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    /* Styling for the login page */
    .login-body {
      background-color: var(--bg-primary);
      background-image: 
        radial-gradient(circle at 50% 15%, rgba(16, 185, 129, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 10% 80%, rgba(6, 182, 212, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), 0 0 20px rgba(16, 185, 129, 0.05);
      animation: fade-in 0.6s ease-out;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header .brand {
      justify-content: center;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      font-family: var(--font-header);
    }

    .brand-icon {
      color: var(--accent-primary);
    }
    
    .brand-name {
      color: var(--text-primary);
    }
    
    .brand-name span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-header h2 {
      font-family: var(--font-header);
      font-size: 1.5rem;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-primary);
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(17, 24, 39, 0.6);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      color: var(--text-primary);
      font-size: 1rem;
      transition: var(--transition-fast);
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent-gradient);
      color: var(--bg-primary);
      border: none;
      border-radius: var(--border-radius-md);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.5rem;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-color);
    }

    .divider:not(:empty)::before {
      margin-right: 1em;
    }

    .divider:not(:empty)::after {
      margin-left: 1em;
    }

    .google-btn {
      width: 100%;
      padding: 0.85rem;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition-fast);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
    }

    .google-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--border-hover);
      transform: translateY(-2px);
    }
    
    .google-btn i {
      font-size: 1.1rem;
    }

    .login-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }

    .login-footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: var(--transition-fast);
    }

    .login-footer a:hover {
      color: var(--accent-primary);
      text-decoration: underline;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-header">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="brand-name">Impact<span>Lens</span></div>
      </div>
      <h2>Welcome Back</h2>
      <p>Sign in to continue to your dashboard</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email or Username</label>
        <input type="text" id="email" name="email" placeholder="Enter your email or username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">
        Login <i class="fa-solid fa-arrow-right-to-bracket"></i>
      </button>
    </form>

    <div class="divider">or continue with</div>

    <button type="button" class="google-btn" id="google-login-btn">
      <i class="fa-brands fa-google" style="color: #ea4335;"></i> Login with Google
    </button>

    <div class="login-footer">
      <a href="#">Forgot Password?</a>
      <a href="#">Create an Account</a>
    </div>
  </div>

  <script>
    // Handle form submission to redirect to dashboard
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault(); 
      window.location.href = 'pages/dashboard.html';
    });

    // Handle Google login button click to redirect to dashboard
    document.getElementById('google-login-btn').addEventListener('click', function() {
      window.location.href = 'pages/dashboard.html';
    });
  </script>
</body>
</html>
