<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — ImpactLens</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .leaderboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      width: 100%;
    }
    
    @media (min-width: 1024px) {
      .leaderboard-grid {
        grid-template-columns: 350px 1fr;
      }
    }
    
    .leaderboard-card {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      padding: 2rem;
    }
    
    .leaderboard-card h2 {
      font-family: var(--font-header);
      font-size: 1.35rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.65rem;
    }
    
    .leaderboard-card h2 i {
      color: #F59E0B; /* Gold trophy color */
    }
    
    .leaderboard-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.015);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius-md);
      transition: var(--transition-fast);
    }
    
    .leaderboard-item:hover {
      border-color: var(--border-hover);
      background: rgba(255, 255, 255, 0.03);
    }
    
    .leaderboard-item.highlight {
      background: rgba(115, 126, 27, 0.05);
      border-color: rgba(115, 126, 27, 0.25);
      box-shadow: 0 0 15px rgba(115, 126, 27, 0.08);
    }
    
    .rank-num {
      font-family: var(--font-header);
      font-weight: 800;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 1rem;
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }
    
    .rank-num.rank-1 {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      color: #000;
      border: none;
      box-shadow: 0 4px 10px rgba(245, 158, 11, 0.3);
    }
    
    .rank-num.rank-2 {
      background: linear-gradient(135deg, #E2E8F0 0%, #CBD5E1 100%);
      color: #000;
      border: none;
    }
    
    .rank-num.rank-3 {
      background: linear-gradient(135deg, #B45309 0%, #78350F 100%);
      color: #fff;
      border: none;
    }
    
    .item-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-family: var(--font-header);
      margin-right: 0.85rem;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }
    
    .item-info {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }
    
    .item-title {
      font-weight: 600;
      font-size: 0.95rem;
    }
    
    .item-subtitle {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }
    
    .item-score {
      font-family: var(--font-header);
      font-weight: 700;
      font-size: 1.15rem;
      color: var(--accent-primary);
      text-align: right;
    }
    
    .item-score span {
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: normal;
      color: var(--text-muted);
      margin-left: 0.15rem;
    }

    /* Player Cards Design */
    .player-feed {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .player-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-lg);
      padding: 1.5rem;
      box-shadow: 4px 4px 0px var(--border-color);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
    }
    
    .player-card:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px var(--border-color);
    }
    
    .player-card-header {
      display: flex;
      align-items: center;
      margin-bottom: 1.25rem;
    }
    
    .player-rank {
      font-family: var(--font-header);
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--text-muted);
      width: 40px;
      margin-right: 1rem;
    }
    
    .player-card:nth-child(1) .player-rank {
      color: #F59E0B;
    }
    
    .player-card:nth-child(2) .player-rank {
      color: #94A3B8;
    }
    
    .player-card:nth-child(3) .player-rank {
      color: #B45309;
    }
    
    .player-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.25rem;
      font-family: var(--font-header);
      border: 2px solid var(--border-color);
      margin-right: 1rem;
    }
    
    .player-info {
      flex-grow: 1;
    }
    
    .player-name {
      font-family: var(--font-header);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .player-team {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    
    .player-score-container {
      text-align: right;
    }
    
    .player-score {
      font-family: var(--font-header);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-primary);
    }
    
    .player-score span {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
    }
    
    .player-highlight {
      background: var(--bg-primary);
      padding: 1rem 1.25rem;
      border-radius: var(--border-radius-md);
      color: var(--text-primary);
      border-left: 4px solid var(--accent-primary);
      font-weight: 600;
      font-size: 0.95rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }
    
    .player-highlight i {
      color: var(--accent-primary);
      margin-top: 0.2rem;
    }
    
    .loading-highlight {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-leaf"></i>
        </div>
        <div class="brand-name">Impact<span>Lens</span></div>
      </div>
      
      <nav style="flex-grow: 1;">
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="dashboard.html" id="nav-dashboard">
              <i class="fa-solid fa-chart-pie"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="form.html" id="nav-form">
              <i class="fa-solid fa-circle-plus"></i>
              <span>Log Activity</span>
            </a>
          </li>
          <li class="nav-item">
            <a href="report.html" id="nav-report">
              <i class="fa-solid fa-file-invoice"></i>
              <span>Impact Report</span>
            </a>
          </li>
          <li class="nav-item active">
            <a href="leaderboard.html" id="nav-leaderboard">
              <i class="fa-solid fa-ranking-star"></i>
              <span>Leaderboard</span>
            </a>
          </li>
        </ul>
      </nav>
      
      <div class="sidebar-footer">
        <a href="../index.html" style="text-decoration: none; color: inherit; display: block; margin-bottom: 0.75rem; font-size: 0.85rem; padding-left: 0.75rem; color: var(--text-secondary); transition: var(--transition-fast);" onmouseover="this.style.color='var(--text-primary)'" onmouseout="this.style.color='var(--text-secondary)'">
          <i class="fa-solid fa-arrow-left-long"></i> Back to Landing
        </a>
        <div class="team-card">
          <div class="team-avatar">L5</div>
          <div class="team-info">
            <span class="team-name">Team Lumen</span>
            <span class="team-role">Sustainability Crew</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content fade-in">
      
      <!-- Top Bar -->
      <section class="top-bar">
        <div class="page-title-container">
          <h1 class="page-title">Impact Leaderboards</h1>
          <p class="page-subtitle">Eco-champions competing to maximize environmental offsets and SDG contributions.</p>
        </div>
      </section>

      <!-- Leaderboards Grid -->
      <section class="leaderboard-grid">
        <!-- Team Leaderboard -->
        <div class="glass-card leaderboard-card">
          <h2><i class="fa-solid fa-trophy"></i> Team Standings</h2>
          <div class="leaderboard-list" id="team-list">
            <!-- Populated dynamically -->
          </div>
        </div>

        <!-- Individual Contributors Leaderboard -->
        <div class="">
          <h2 style="font-family: var(--font-header); font-size: 1.75rem; font-weight: 800; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;"><i class="fa-solid fa-medal" style="color: var(--accent-primary);"></i> Top Contributors (Lumen)</h2>
          <div class="player-feed" id="user-list">
            <!-- Populated dynamically via JS -->
          </div>
        </div>
      </section>

    </main>
  </div>
  <script src="../js/utils.js"></script>
  <script src="../js/leaderboard.js"></script>
</body>
</html>
